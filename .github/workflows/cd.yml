name: CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.tags }}-backend:${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      frontend_image: ${{ steps.meta.outputs.tags }}-frontend:${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ai:
    runs-on: ubuntu-latest
    outputs:
      ai_image: ${{ steps.meta.outputs.tags }}-ai:${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ai
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push AI service Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: [build-backend, build-frontend, build-ai]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          echo "Backend image: ${{ needs.build-backend.outputs.backend_image }}"
          echo "Frontend image: ${{ needs.build-frontend.outputs.frontend_image }}"
          echo "AI image: ${{ needs.build-ai.outputs.ai_image }}"

          cd docker
          cat > .env.staging << EOF
          BACKEND_IMAGE=${{ needs.build-backend.outputs.backend_image }}
          FRONTEND_IMAGE=${{ needs.build-frontend.outputs.frontend_image }}
          AI_IMAGE=${{ needs.build-ai.outputs.ai_image }}
          SPRING_PROFILES_ACTIVE=prod
          DB_HOST=mysql-staging
          DB_PORT=3306
          DB_NAME=zcxt
          DB_USER=root
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_HOST=redis-staging
          APP_SECURITY_JWT_SECRET=${{ secrets.JWT_SECRET }}
          APP_CRYPTO_AESKEY=${{ secrets.AES_KEY }}
          APP_AI_ENABLED=true
          APP_AI_BASEURL=http://ai:9000
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_API_URL=${{ secrets.LLM_API_URL }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          EOF

          echo "Starting deployment..."
          docker-compose -f docker-compose.staging.yml up -d
          
          echo "Waiting for services to start..."
          sleep 30
          
          echo "Checking service health..."
          docker-compose -f docker-compose.staging.yml ps
          
          echo "Health check for backend..."
          if ! docker-compose -f docker-compose.staging.yml exec -T backend curl -f http://localhost:8080/actuator/health 2>/dev/null; then
            echo "Backend health check failed, rolling back..."
            docker-compose -f docker-compose.staging.yml down
            exit 1
          fi
          
          echo "Health check for frontend..."
          if ! docker-compose -f docker-compose.staging.yml exec -T frontend curl -f http://localhost/ 2>/dev/null; then
            echo "Frontend health check failed, rolling back..."
            docker-compose -f docker-compose.staging.yml down
            exit 1
          fi
          
          echo "Health check for AI service..."
          if ! docker-compose -f docker-compose.staging.yml exec -T ai curl -f http://localhost:9000/health 2>/dev/null; then
            echo "AI service health check failed, rolling back..."
            docker-compose -f docker-compose.staging.yml down
            exit 1
          fi
          
          echo "Deployment completed successfully!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    needs: [build-backend, build-frontend, build-ai]
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          echo "This requires manual approval and should be run with caution!"
          echo "Backend image: ${{ needs.build-backend.outputs.backend_image }}"
          echo "Frontend image: ${{ needs.build-frontend.outputs.frontend_image }}"
          echo "AI image: ${{ needs.build-ai.outputs.ai_image }}"

          cd docker
          cat > .env.production << EOF
          BACKEND_IMAGE=${{ needs.build-backend.outputs.backend_image }}
          FRONTEND_IMAGE=${{ needs.build-frontend.outputs.frontend_image }}
          AI_IMAGE=${{ needs.build-ai.outputs.ai_image }}
          SPRING_PROFILES_ACTIVE=prod
          DB_HOST=mysql-prod
          DB_PORT=3306
          DB_NAME=zcxt
          DB_USER=root
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_HOST=redis-prod
          APP_SECURITY_JWT_SECRET=${{ secrets.JWT_SECRET }}
          APP_CRYPTO_AESKEY=${{ secrets.AES_KEY }}
          APP_AI_ENABLED=true
          APP_AI_BASEURL=http://ai:9000
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_API_URL=${{ secrets.LLM_API_URL }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          MINIO_BUCKET=qrcodes
          DOMAIN=${{ secrets.DOMAIN }}
          EOF

          echo "Starting production deployment..."
          docker-compose -f docker-compose.production.yml up -d
          
          echo "Waiting for services to start..."
          sleep 60
          
          echo "Checking service health..."
          docker-compose -f docker-compose.production.yml ps
          
          echo "Health check for backend..."
          if ! docker-compose -f docker-compose.production.yml exec -T backend curl -f http://localhost:8080/actuator/health 2>/dev/null; then
            echo "Backend health check failed, rolling back..."
            docker-compose -f docker-compose.production.yml down
            exit 1
          fi
          
          echo "Health check for frontend..."
          if ! docker-compose -f docker-compose.production.yml exec -T frontend curl -f http://localhost/ 2>/dev/null; then
            echo "Frontend health check failed, rolling back..."
            docker-compose -f docker-compose.production.yml down
            exit 1
          fi
          
          echo "Health check for AI service..."
          if ! docker-compose -f docker-compose.production.yml exec -T ai curl -f http://localhost:9000/health 2>/dev/null; then
            echo "AI service health check failed, rolling back..."
            docker-compose -f docker-compose.production.yml down
            exit 1
          fi
          
          echo "Production deployment completed successfully!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}