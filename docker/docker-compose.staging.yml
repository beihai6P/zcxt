services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend-network

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    networks:
      - backend-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9002"
    ports:
      - "9001:9000"
      - "9002:9002"
    volumes:
      - minio_data:/data
    networks:
      - backend-network

  ai:
    image: ${AI_IMAGE}
    ports:
      - "9000:9000"
    environment:
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_API_URL: "${LLM_API_URL}"
      LLM_MODEL: "${LLM_MODEL}"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    image: ${BACKEND_IMAGE}
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET}
      APP_CRYPTO_AESKEY: ${APP_CRYPTO_AESKEY}
      APP_AI_ENABLED: ${APP_AI_ENABLED}
      APP_AI_BASEURL: ${APP_AI_BASEURL}
      APP_QRCODE_BASEURL: http://localhost:8080
      APP_QRCODE_STORAGE: local
      APP_QRCODE_LOCALDIR: /app/data/qrcodes
    ports:
      - "8080:8080"
    volumes:
      - backend_data:/app/data
      - ./logs/backend:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - backend-network

volumes:
  mysql_data:
  minio_data:
  backend_data:

networks:
  backend-network:
    driver: bridge