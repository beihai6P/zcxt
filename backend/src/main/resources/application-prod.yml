spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zcxt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: change-me
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  qrcode:
    storage: minio
    minio:
      endpoint: http://localhost:9001
      publicEndpoint: http://localhost:9001
      accessKey: minioadmin
      secretKey: minioadmin
      bucket: zcxt
  ai:
    enabled: true
    baseUrl: http://localhost:9000
  bigdata:
    enabled: true
