spring:
  application:
    name: zcxt-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:./config/application.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  security:
    jwt:
      issuer: ${APP_JWT_ISSUER:zcxt}
      ttlSeconds: ${APP_JWT_TTL:86400}
      secret: ${APP_SECURITY_JWT_SECRET:change-me-in-prod}
  crypto:
    aesKey: ${APP_CRYPTO_AESKEY:change-me-in-prod}
  qrcode:
    baseUrl: ${APP_QRCODE_BASEURL:http://localhost:8080}
    storage: ${APP_QRCODE_STORAGE:local}
    localDir: ${APP_QRCODE_LOCALDIR:./data/qrcodes}
  ai:
    enabled: ${APP_AI_ENABLED:false}
    baseUrl: ${APP_AI_BASEURL:http://localhost:9000}
  bigdata:
    enabled: ${APP_BIGDATA_ENABLED:false}

---
spring:
  config:
    activate:
      on-profile: dev
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password:
    timeout: 5000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1

---
spring:
  config:
    activate:
      on-profile: prod
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password:
    timeout: 5000
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: -1