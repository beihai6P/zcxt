spring:
  datasource:
    url: jdbc:h2:file:./data/h2/zcxt;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      repositories:
        enabled: false
  cache:
    type: caffeine

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  security:
    jwt:
      secret: dev-jwt-secret-dev-jwt-secret-dev-jwt-secret
  crypto:
    aesKey: dev-aes-key-dev-aes-key-dev-aes-key

